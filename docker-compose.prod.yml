# Configuración para Producción con Docker Compose

version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: kioscos_db_prod
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: kioscos_api_prod
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      NODE_ENV: production
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    networks:
      - kioscos_network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: kioscos_web_prod
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    restart: always
    networks:
      - kioscos_network

  redis:
    image: redis:7-alpine
    container_name: kioscos_cache_prod
    volumes:
      - redis_prod_data:/data
    restart: always
    networks:
      - kioscos_network

volumes:
  postgres_prod_data:
  redis_prod_data:

networks:
  kioscos_network:
    driver: bridge
